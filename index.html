<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Replay Caffe & Food Bar - Cenovnik</title>
<style>

  :root {
    --bg: #0c0a08;
    --bg-elevated: #16120e;
    --gold: #d4a843;
    --gold-bright: #f0c869;
    --cream: #ece4d6;
    --muted: #9a8f7e;
    --line: rgba(212,168,67,0.18);
    --red-accent: #a8404a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    background-image:
      radial-gradient(circle at 20% 0%, rgba(212,168,67,0.06), transparent 40%),
      radial-gradient(circle at 80% 100%, rgba(168,64,74,0.05), transparent 40%);
    color: var(--cream);
    font-family: 'Georgia', 'Iowan Old Style', serif;
    min-height: 100vh;
    padding-bottom: 60px;
  }

  .hero {
    text-align: center;
    padding: 48px 20px 28px;
    border-bottom: 1px solid var(--line);
    position: relative;
  }

  .hero::after {
    content: "";
    position: absolute;
    bottom: -1px; left: 50%;
    transform: translateX(-50%);
    width: 80px; height: 2px;
    background: var(--gold);
  }

  .hero .eyebrow {
    font-family: 'Helvetica Neue', Arial, sans-serif;
    font-size: 11px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 10px;
  }

  .hero h1 {
    font-size: 38px;
    letter-spacing: 1px;
    font-weight: 400;
    color: var(--gold-bright);
    text-shadow: 0 2px 20px rgba(240,200,105,0.25);
  }

  .hero .sub {
    margin-top: 8px;
    font-size: 13px;
    color: var(--muted);
    font-family: 'Helvetica Neue', Arial, sans-serif;
    letter-spacing: 1px;
  }

  .nav {
    display: flex;
    overflow-x: auto;
    gap: 8px;
    padding: 16px 16px;
    position: sticky;
    top: 0;
    background: rgba(12,10,8,0.92);
    backdrop-filter: blur(6px);
    z-index: 10;
    border-bottom: 1px solid var(--line);
    -ms-overflow-style: none;
    scrollbar-width: none;
  }
  .nav::-webkit-scrollbar { display: none; }

  .nav a {
    flex: 0 0 auto;
    font-family: 'Helvetica Neue', Arial, sans-serif;
    font-size: 12px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    color: var(--muted);
    text-decoration: none;
    padding: 8px 14px;
    border: 1px solid var(--line);
    border-radius: 20px;
    white-space: nowrap;
    transition: all 0.2s;
    cursor: pointer;
  }
  .nav a:active, .nav a.active {
    color: var(--bg);
    background: var(--gold);
    border-color: var(--gold);
  }

  section {
    padding: 36px 18px 8px;
    max-width: 640px;
    margin: 0 auto;
    scroll-margin-top: 70px;
  }

  .section-title {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 18px;
  }

  .section-title h2 {
    font-size: 22px;
    color: var(--gold-bright);
    font-weight: 400;
    letter-spacing: 0.5px;
    white-space: nowrap;
  }

  .section-title .rule {
    flex: 1;
    height: 1px;
    background: linear-gradient(to right, var(--line), transparent);
  }

  .pizza-head {
    display: grid;
    grid-template-columns: 1fr 56px 64px 64px;
    gap: 6px;
    padding: 0 4px 8px;
    font-family: 'Helvetica Neue', Arial, sans-serif;
    font-size: 10px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    color: var(--muted);
    border-bottom: 1px solid var(--line);
    margin-bottom: 6px;
  }
  .pizza-head span:not(:first-child) { text-align: right; }

  .pizza-item {
    display: grid;
    grid-template-columns: 1fr 56px 64px 64px;
    gap: 6px;
    align-items: start;
    padding: 12px 4px;
    border-bottom: 1px solid rgba(212,168,67,0.08);
  }

  .pizza-item .name {
    font-size: 16px;
    color: var(--cream);
    line-height: 1.3;
  }

  .pizza-item .desc {
    font-family: 'Helvetica Neue', Arial, sans-serif;
    font-size: 11.5px;
    color: var(--muted);
    margin-top: 3px;
    line-height: 1.4;
  }

  .pizza-item .price {
    font-family: 'Helvetica Neue', Arial, sans-serif;
    font-size: 14px;
    color: var(--gold-bright);
    text-align: right;
    white-space: nowrap;
    padding-top: 1px;
  }
  .pizza-item .price.empty { color: var(--muted); opacity: 0.4; }

  .item-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 14px;
    padding: 13px 4px;
    border-bottom: 1px solid rgba(212,168,67,0.08);
  }
  .item-row:last-child { border-bottom: none; }

  .item-row .info .name {
    font-size: 16px;
    color: var(--cream);
  }
  .item-row .info .desc {
    font-family: 'Helvetica Neue', Arial, sans-serif;
    font-size: 11.5px;
    color: var(--muted);
    margin-top: 3px;
    line-height: 1.4;
  }
  .item-row .price {
    font-family: 'Helvetica Neue', Arial, sans-serif;
    font-size: 15px;
    color: var(--gold-bright);
    white-space: nowrap;
    padding-top: 1px;
  }

  .addon-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0 20px;
  }
  .addon-grid .addon {
    display: flex;
    justify-content: space-between;
    padding: 9px 2px;
    border-bottom: 1px dashed rgba(212,168,67,0.12);
    font-size: 14px;
  }
  .addon-grid .addon .price {
    font-family: 'Helvetica Neue', Arial, sans-serif;
    color: var(--gold-bright);
    font-size: 13.5px;
  }

  .highlight-banner {
    background: var(--bg-elevated);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 18px;
    font-family: 'Helvetica Neue', Arial, sans-serif;
    font-size: 12px;
    color: var(--gold);
    text-align: center;
    letter-spacing: 0.3px;
  }
  .highlight-banner b { color: var(--gold-bright); }

  footer {
    text-align: center;
    padding: 40px 20px 10px;
    font-family: 'Helvetica Neue', Arial, sans-serif;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1px;
  }
  footer .line {
    width: 40px; height: 1px;
    background: var(--line);
    margin: 0 auto 14px;
  }

  .loading-state, .error-state {
    text-align: center;
    padding: 80px 20px;
    color: var(--muted);
    font-family: 'Helvetica Neue', Arial, sans-serif;
  }

</style>
</head>
<body>

  <div class="hero">
    <div class="eyebrow">Sivac</div>
    <h1>Replay</h1>
    <div class="sub">Caffe & Food Bar — Cenovnik</div>
  </div>

  <nav class="nav" id="nav"></nav>

  <div id="content">
    <div class="loading-state">Učitavanje cenovnika…</div>
  </div>

  <footer>
    <div class="line"></div>
    Caffe & Food Bar Replay — Sivac
  </footer>

<script>

  const SHEET_ID = "14SbWosIrf5zWIB0CUGmkxexUrsGGSC4vtfowGs50TlE";
  const GID = "864425803";
  const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&gid=${GID}`;

  // Pizza category gets the 3-column size layout; everything else gets simple rows
  const PIZZA_CATEGORY = "Pizza";

  // Category display order and special banners/notes
  const CATEGORY_CONFIG = {
    "Pizza": { icon: null, banner: null },
    "Pohovane palačinke": { banner: 'U porciji dobijate <b>2</b> bogato punjene pohovane palačinke!' },
  };

  function parseCSV(text) {
    // Simple robust CSV parser handling quoted fields with commas
    const rows = [];
    let row = [];
    let field = '';
    let inQuotes = false;

    for (let i = 0; i < text.length; i++) {
      const char = text[i];
      const next = text[i+1];

      if (inQuotes) {
        if (char === '"' && next === '"') { field += '"'; i++; }
        else if (char === '"') { inQuotes = false; }
        else { field += char; }
      } else {
        if (char === '"') { inQuotes = true; }
        else if (char === ',') { row.push(field); field = ''; }
        else if (char === '\n' || char === '\r') {
          if (char === '\r' && next === '\n') i++;
          row.push(field); field = '';
          if (row.length > 1 || row[0] !== '') rows.push(row);
          row = [];
        } else { field += char; }
      }
    }
    if (field !== '' || row.length) { row.push(field); rows.push(row); }
    return rows;
  }

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  function slugify(str) {
    return str.toLowerCase()
      .replace(/[čć]/g, 'c').replace(/[š]/g, 's').replace(/[ž]/g, 'z').replace(/[đ]/g, 'dj')
      .replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '');
  }

  function renderPizzaSection(category, items) {
    let html = `<div class="pizza-head"><span></span><span>24cm</span><span>32cm</span><span>50cm</span></div>`;
    items.forEach(item => {
      const small = item.cena_mala ? escapeHtml(item.cena_mala) : null;
      const med = item.cena_srednja ? escapeHtml(item.cena_srednja) : null;
      const large = item.cena_velika ? escapeHtml(item.cena_velika) : null;
      html += `
        <div class="pizza-item">
          <div>
            <div class="name">${escapeHtml(item.naziv)}</div>
            ${item.opis ? `<div class="desc">${escapeHtml(item.opis)}</div>` : ''}
          </div>
          <div class="price ${small ? '' : 'empty'}">${small || '—'}</div>
          <div class="price ${med ? '' : 'empty'}">${med || '—'}</div>
          <div class="price ${large ? '' : 'empty'}">${large || '—'}</div>
        </div>`;
    });
    return html;
  }

  function renderStandardSection(items) {
    let html = '';
    items.forEach(item => {
      html += `
        <div class="item-row">
          <div class="info">
            <div class="name">${escapeHtml(item.naziv)}</div>
            ${item.opis ? `<div class="desc">${escapeHtml(item.opis)}</div>` : ''}
          </div>
          <div class="price">${escapeHtml(item.cena_mala)}</div>
        </div>`;
    });
    return html;
  }

  function renderAddonSection(items) {
    let html = '<div class="addon-grid">';
    items.forEach(item => {
      html += `<div class="addon"><span>${escapeHtml(item.naziv)}</span><span class="price">${escapeHtml(item.cena_mala)}</span></div>`;
    });
    html += '</div>';
    return html;
  }

  async function loadMenu() {
    try {
      const res = await fetch(CSV_URL);
      if (!res.ok) throw new Error('Network error');
      const text = await res.text();
      const rows = parseCSV(text);

      if (rows.length < 2) throw new Error('No data');

      const headers = rows[0].map(h => h.trim());
      const data = rows.slice(1).map(r => {
        const obj = {};
        headers.forEach((h, i) => obj[h] = (r[i] || '').trim());
        return obj;
      }).filter(row => row.kategorija && row.naziv);

      // Group by category, preserving first-seen order
      const categories = [];
      const grouped = {};
      data.forEach(item => {
        if (!grouped[item.kategorija]) {
          grouped[item.kategorija] = [];
          categories.push(item.kategorija);
        }
        grouped[item.kategorija].push(item);
      });

      // Build nav
      const nav = document.getElementById('nav');
      nav.innerHTML = categories.map(cat =>
        `<a href="#${slugify(cat)}">${escapeHtml(cat)}</a>`
      ).join('');

      // Build content
      const content = document.getElementById('content');
      content.innerHTML = categories.map(cat => {
        const items = grouped[cat];
        const config = CATEGORY_CONFIG[cat] || {};
        const isPizza = cat === PIZZA_CATEGORY;

        let inner;
        if (isPizza) {
          inner = renderPizzaSection(cat, items);
        } else if (cat.toLowerCase().includes('dodaci')) {
          inner = renderAddonSection(items);
        } else {
          inner = renderStandardSection(items);
        }

        const banner = config.banner ? `<div class="highlight-banner">${config.banner}</div>` : '';

        return `
          <section id="${slugify(cat)}">
            <div class="section-title"><h2>${escapeHtml(cat)}</h2><div class="rule"></div></div>
            ${banner}
            ${inner}
          </section>`;
      }).join('');

      // Scroll-spy nav highlighting
      const sections = document.querySelectorAll('section');
      const navLinks = document.querySelectorAll('.nav a');
      function onScroll() {
        let current = '';
        sections.forEach(sec => {
          const rect = sec.getBoundingClientRect();
          if (rect.top <= 100) current = sec.id;
        });
        navLinks.forEach(link => {
          link.classList.toggle('active', link.getAttribute('href') === '#' + current);
        });
      }
      window.addEventListener('scroll', onScroll);
      onScroll();

    } catch (err) {
      document.getElementById('content').innerHTML =
        `<div class="error-state">Trenutno ne možemo da učitamo cenovnik.<br>Pokušajte ponovo za nekoliko trenutaka.</div>`;
      console.error(err);
    }
  }

  loadMenu();

</script>

</body>
</html>
